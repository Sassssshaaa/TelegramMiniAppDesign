<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vape Shop Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121417;
            --card-bg: #1c1e22;
            --accent-green: #3cdd56;
            --text-main: #ffffff;
            --text-muted: #8e929a;
            --badge-bg: #2a2d34;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        /* Шапка */
        .header {
            padding: 16px;
        }
        .header .greeting {
            font-size: 14px;
            color: var(--text-muted);
        }
        .header h1 {
            font-size: 26px;
            color: var(--accent-green);
            margin-top: 4px;
        }

        /* Поиск */
        .search-box {
            padding: 0 16px;
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #2d3139;
            background: #181a1f;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        /* Категории */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            padding: 0 16px;
            margin-bottom: 12px;
        }
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 16px;
            margin-bottom: 24px;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-card {
            background: var(--card-bg);
            padding: 12px 16px;
            border-radius: 16px;
            min-width: 80px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .cat-card.active {
            border-color: var(--accent-green);
        }

        /* Сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
        }
        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .product-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: 12px;
            background: #fff;
            margin-bottom: 10px;
        }
        .badges {
            position: absolute;
            top: 18px;
            left: 18px;
            display: flex;
            gap: 4px;
        }
        .badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 6px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .badge-new { background: var(--accent-green); color: #000; }
        .badge-hit { background: #ff5e3a; color: #fff; }

        .product-title { font-size: 16px; font-weight: 700; }
        .product-brand { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        
        .tags { display: flex; gap: 6px; margin-bottom: 8px; }
        .tag {
            background: var(--badge-bg);
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            color: #d1d5db;
        }

        .rating { color: #f59e0b; font-size: 12px; margin-bottom: 12px; }

        .card-bottom {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price { font-size: 18px; font-weight: 800; color: var(--accent-green); }
        .add-btn {
            background: var(--accent-green);
            color: #000;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Корзина */
        .cart-page { display: none; padding: 16px; }
        .cart-empty {
            text-align: center;
            margin-top: 60px;
            color: var(--text-muted);
        }
        .cart-empty-icon { font-size: 64px; margin-bottom: 16px; }
        .form-group { margin-top: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2d3139;
            background: #181a1f;
            color: #fff;
        }
        .checkout-btn {
            width: 100%;
            background: var(--accent-green);
            color: #000;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }

        /* Нижнее меню */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: #16181d;
            border-top: 1px solid #23262d;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-item.active { color: var(--accent-green); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <!-- ВКЛАДКА: ГЛАВНАЯ / КАТАЛОГ -->
    <div id="catalog-page">
        <div class="header">
            <div class="greeting">Добро пожаловать 👋</div>
            <h1>Привет!</h1>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" placeholder="Найти жидкость...">
        </div>

        <div class="section-title">Категории</div>
        <div class="categories">
            <div class="cat-card active">💧 Фрукты</div>
            <div class="cat-card">🫐 Ягоды</div>
            <div class="cat-card">❄️ Лед</div>
            <div class="cat-card">☕ Напитки</div>
        </div>

        <div class="section-title">🔥 Популярные вкусы</div>
        <div class="products-grid">
            <!-- Карточка товара -->
            <div class="product-card">
                <div class="badges">
                    <span class="badge badge-new">NEW</span>
                    <span class="badge badge-hit">🔥 ХИТ</span>
                </div>
                <img src="https://via.placeholder.com/150" alt="Apple Peach" class="product-img">
                <div class="product-title">Apple Peach</div>
                <div class="product-brand">ElfLiq</div>
                <div class="tags">
                    <span class="tag">30 мл</span>
                    <span class="tag">50 мг</span>
                </div>
                <div class="rating">★ ★ ★ ★ ★ 4.9</div>
                <div class="card-bottom">
                    <div class="price">350 Kč</div>
                    <button class="add-btn" onclick="addToCart('Apple Peach', 350)">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА: КОРЗИНА -->
    <div id="cart-page" class="cart-page">
        <h2>Корзина</h2>
        <div id="cart-content">
            <div class="cart-empty">
                <div class="cart-empty-icon">🛒</div>
                <h3>Корзина пуста</h3>
                <p style="margin-top: 8px;">Добавьте понравившиеся жидкости из каталога</p>
            </div>
        </div>
    </div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('catalog')">
            <span class="nav-icon">🏠</span>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="switchTab('catalog')">
            <span class="nav-icon">⊞</span>
            <span>Каталог</span>
        </div>
        <div class="nav-item" onclick="switchTab('cart')">
            <span class="nav-icon">🛒</span>
            <span>Корзина (<span id="cart-count">0</span>)</span>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // НАСТРОЙКИ ДЛЯ ОТПРАВКИ ЗАКАЗА
        const BOT_TOKEN = "8800322131:AAGyDmhejJga0F65FobakauJdTcRE_8KPnw"; // Вставьте токен вашего бота
        const ADMIN_CHAT_ID = "8461436945"; // Вставьте ваш личный Telegram ID

        let cart = [];

        // Переключение вкладок
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (tab === 'catalog') {
                document.getElementById('catalog-page').style.display = 'block';
                document.getElementById('cart-page').style.display = 'none';
                event.currentTarget.classList.add('active');
            } else if (tab === 'cart') {
                document.getElementById('catalog-page').style.display = 'none';
                document.getElementById('cart-page').style.display = 'block';
                event.currentTarget.classList.add('active');
                renderCart();
            }
        }

        // Добавление в корзину
        function addToCart(title, price) {
            cart.push({ title, price });
            document.getElementById('cart-count').innerText = cart.length;
            tg.HapticFeedback.impactOccurred('medium'); // Легкая вибрация при клике
        }

        // Отрисовка корзины и формы оформления
        function renderCart() {
            const container = document.getElementById('cart-content');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">🛒</div>
                        <h3>Корзина пуста</h3>
                        <p style="margin-top: 8px;">Добавьте понравившиеся жидкости из каталога</p>
                    </div>`;
                return;
            }

            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let user = tg.initDataUnsafe?.user || {};

            container.innerHTML = `
                <div style="margin-bottom: 20px;">
                    ${cart.map(item => `
                        <div style="display:flex; justify-content:space-between; background:var(--card-bg); padding:12px; border-radius:10px; margin-bottom:8px;">
                            <span>${item.title}</span>
                            <span style="color:var(--accent-green); font-weight:bold;">${item.price} Kč</span>
                        </div>
                    `).join('')}
                    <div style="text-align:right; font-size:18px; font-weight:bold; margin-top:12px;">
                        Итого: <span style="color:var(--accent-green);">${total} Kč</span>
                    </div>
                </div>

                <h3>Данные для доставки</h3>
                <div class="form-group">
                    <label>Имя и Фамилия</label>
                    <input type="text" id="name" class="form-input" value="${user.first_name || ''} ${user.last_name || ''}">
                </div>
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="tel" id="phone" class="form-input" placeholder="+420 ...">
                </div>
                <div class="form-group">
                    <label>Адрес / Город / Отделение Zásilkovna</label>
                    <input type="text" id="address" class="form-input" placeholder="Например: Praha, Zásilkovna №123">
                </div>

                <button class="checkout-btn" onclick="sendOrder(${total})">Подтвердить заказ (${total} Kč)</button>
            `;
        }

        // Отправка заказа в Telegram
        function sendOrder(total) {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const username = tg.initDataUnsafe?.user?.username ? `@${tg.initDataUnsafe.user.username}` : 'не указан';

            if (!phone || !address) {
                alert('Пожалуйста, заполните телефон и адрес доставки!');
                return;
            }

            const message = `
🚨 <b>НОВЫЙ ЗАКАЗ В МАГАЗИНЕ!</b>

👤 <b>Покупатель:</b> ${name} (${username})
📞 <b>Телефон:</b> ${phone}
📍 <b>Доставка:</b> ${address}

🛒 <b>Товары:</b>
${cart.map(i => `• ${i.title} - ${i.price} Kč`).join('\n')}

💰 <b>Сумма заказа:</b> ${total} Kč
            `;

            fetch(`https://api.telegram.org/bot${8800322131:AAGyDmhejJga0F65FobakauJdTcRE_8KPnw}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            }).then(res => {
                if(res.ok) {
                    tg.showAlert("Ваш заказ успешно оформлен! Мы свяжемся с вами.");
                    cart = [];
                    document.getElementById('cart-count').innerText = 0;
                    switchTab('catalog');
                } else {
                    alert("Ошибка отправки заказа.");
                }
            });
        }
    </script>
</body>
</html>
